<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부전동 실시간 날씨 모니터링</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="description" content="부산광역시 부산진구 부전동의 실시간 기상 상태를 모니터링합니다.">
</head>
<body>
    <div id="app" class="weather-clear">
        <div class="overlay"></div>
        <main class="container">
            <header class="header">
                <div class="location-info">
                    <h1 id="location-name">부산광역시 부산진구 부전동</h1>
                    <p id="current-time">--</p>
                </div>
                <div class="status-badge" id="update-status">
                    <span class="status-dot"></span>
                    실시간 모니터링 중
                </div>
            </header>
            <section class="main-weather">
                <div class="weather-card glass">
                    <div class="weather-main-info">
                        <div class="weather-icon-container" id="weather-icon"><div class="sun"></div></div>
                        <div class="temp-container"><span id="current-temp" class="temp">--</span><span class="unit">°C</span></div>
                        <div class="weather-desc" id="weather-desc">데이터를 불러오는 중...</div>
                    </div>
                    <div class="weather-details-grid">
                        <div class="detail-item"><span class="label">강수량</span><span id="rain-amount" class="value">--</span><span class="sub-unit">mm</span></div>
                        <div class="detail-item"><span class="label">강수확률</span><span id="pop-chance" class="value">--</span><span class="sub-unit">%</span></div>
                        <div class="detail-item"><span class="label">습도</span><span id="humidity" class="value">--</span><span class="sub-unit">%</span></div>
                        <div class="detail-item"><span class="label">풍속</span><span id="wind-speed" class="value">--</span><span class="sub-unit">m/s</span></div>
                        <div class="detail-item"><span class="label">풍향</span><span id="wind-direction" class="value">--</span></div>
                    </div>
                </div>
            </section>
            <section class="forecast-hint">
                <p>최근 업데이트: <span id="last-update-time">--:--</span></p>
                <button id="refresh-btn" class="refresh-btn">새로고침</button>
            </section>
        </main>
        <footer class="footer"><p>&copy; 2026 Weather Monitor. Data provided by KMA.</p></footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
